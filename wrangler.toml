name = "nasaka-iebc"
pages_build_output_dir = "dist"
compatibility_date = "2024-04-01"

# Custom domain: nasakaiebc.civiceducationkenya.com
# routes = [
#   { pattern = "nasakaiebc.civiceducationkenya.com/map-data/*", zone_name = "civiceducationkenya.com" }
# ]

[vars]
SUPABASE_URL = "https://bfatlkobozblunojtltp.supabase.co"
B2_BUCKET_NAME = "map-data"
B2_ENDPOINT = "s3.eu-central-003.backblazeb2.com"
B2_REGION = "eu-central-003"

# R2 bucket binding for high-speed failover
[[r2_buckets]]
binding = "NASAKA_STATIC"
bucket_name = "nasaka-static"

# Cron trigger to sync data from Supabase to B2 (daily)
# Note: Pages does not support crons in wrangler.toml. 
# Configure the cron for 'static.civiceducationkenya.com' in the Workers Dashboard instead.
