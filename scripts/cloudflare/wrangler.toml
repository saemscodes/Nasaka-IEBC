name = "nasaka-map-data-worker"
main = "worker.js"
compatibility_date = "2024-04-01"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
SUPABASE_URL = "https://bfatlkobozblunojtltp.supabase.co"
B2_BUCKET_NAME = "map-data"
B2_ENDPOINT = "s3.eu-central-003.backblazeb2.com"
B2_REGION = "eu-central-003"

# R2 bucket binding for high-speed failover
[[r2_buckets]]
binding = "NASAKA_STATIC"
bucket_name = "nasaka-static"

# Cron trigger to sync data from Supabase to B2 (daily)
[triggers]
crons = ["0 3 * * *"]
