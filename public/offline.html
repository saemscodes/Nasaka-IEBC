<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Nasaka IEBC</title>
    <style>
        :root {
            --primary: #0b63c6;
            --primary-dark: #0851a1;
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666666;
            --kenya-red: #BB0000;
            --kenya-green: #006600;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #f8fafc;
                --text-muted: #94a3b8;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .illustration {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .actions {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr;
        }

        @media (min-width: 480px) {
            .actions {
                grid-template-columns: 1fr 1fr;
            }

            .btn-full {
                grid-column: span 2;
            }
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 0.9375rem;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(11, 99, 198, 0.2), 0 2px 4px -1px rgba(11, 99, 198, 0.1);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background-color: rgba(11, 99, 198, 0.05);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .brand {
            margin-top: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.6;
        }

        .flag-stripe {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }

        .stripe-black {
            background: black;
        }

        .stripe-red {
            background: var(--kenya-red);
        }

        .stripe-green {
            background: var(--kenya-green);
        }

        .brand span {
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        svg#illustration-lost {
            fill: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Embedded SVG Illustration -->
        <div class="illustration">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 885 708" id="illustration-lost">
                <circle cx="565" cy="394" r="110" fill="currentColor" fill-opacity="0.1" />
                <path d="M418 454l-29-11-33 4-38 15s8 108-4 133c0 0 10 14 51 10 0 0 40-5 41-18s1-37 1-37l14-48z"
                    fill="currentColor" />
                <circle cx="465" cy="412" r="24" fill="#ffb6b6" />
                <path d="M487 413a24 24 0 0 1-48 0v-1a24 24 0 0 1 48 1z" fill="#ffb6b6" />
                <path
                    d="M467 409c1-.2 3-.5 4 .2 3 1.5 2 5.8 4 8.6 1 1 2 2 2 3.3s0 2.7.8 3.9c1 1.7 3.6 2 5.3.9 1.7-1 2.3-3.2 3.3-4.7s1.1-3.4 2.4-4.5c.7-.5 1-.8 1.4-1.1s.3-1.1.3-1.8c0-4.1-.6-7.3.3-11.3 1.5-6.4 2.9-9.6-1.9-14.4a16 16 0 0 0-8.9-4.5c-3-.5-7.5 3.7-10.6 3.6-7.8-.3-14.4-7.5-21.9-5.2a15 15 0 0 0-8.1 5.9c-3.6 5.4-3.3 7.5-2.8 13.9 0 .5.1 1 .4 1.4s.7.5 1 .8.3.9.3 1.5 0 2 0 3a1 1 0 0 0 .5.4c3 1.1 6.3-1 9.6-1s6.4 2.2 9.7 1.8c2.4-.4 5.4-1.4 8.4-1.9z"
                    fill="#2f2e41" />
                <path d="M992 803H158a1 1 0 0 1 0-2h834a1 1 0 0 1 0 2z" transform="translate(-157 -95)"
                    fill="#cacaca" />
            </svg>
        </div>

        <h1>Lost in the connection?</h1>
        <p>You're currently offline, but Nasaka has all your critical IEBC data saved. You can continue using the map
            with previously loaded locations.</p>

        <div class="actions">
            <button onclick="window.location.reload()" class="btn btn-primary btn-full">Retry Connection</button>
            <a href="/map" class="btn btn-outline">Access Map Offline</a>
            <a href="/" class="btn btn-outline">Go to Home</a>
        </div>

        <div class="brand">
            <div class="flag-stripe stripe-black"></div>
            <div class="flag-stripe stripe-red"></div>
            <div class="flag-stripe stripe-green"></div>
            <span>NASAKA IEBC</span>
        </div>
    </div>
</body>

</html>
