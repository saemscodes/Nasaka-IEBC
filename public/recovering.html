<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasaka IEBC · Recovering</title>
    <link rel="icon" type="image/svg+xml" href="/nasaka.svg" />
    <style>
        :root {
            --blue: #1E6BFF;
            --bg: #E8EEF8;
            --bg-white: #F0F4FF;
            --text: #111214;
            --text-muted: #4A5568;
        }

        html.dark {
            --bg: #0D1117;
            --bg-white: #161B22;
            --text: #E6EDF3;
            --text-muted: #8B949E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .topo-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.06;
            z-index: 0;
            filter: hue-rotate(40deg);
        }

        .topo-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 32px;
            border-radius: 50%;
            background: var(--blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(30, 107, 255, 0.25);
        }

        .logo img {
            width: 48px;
            height: 48px;
            filter: brightness(0) invert(1);
        }

        h1 {
            font-size: clamp(32px, 8vw, 42px);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        h1 span {
            color: var(--blue);
        }

        p {
            font-size: 17px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--blue);
            margin-bottom: 12px;
            background: rgba(30, 107, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--blue);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0D1117;
                --bg-white: #161B22;
                --text: #E6EDF3;
                --text-muted: #8B949E;
            }
        }
    </style>
    <script>
        if (localStorage.getItem('nasaka-theme') === 'dark' ||
            (!localStorage.getItem('nasaka-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body>
    <div class="topo-bg">
        <img src="/topo-bg.svg" alt="" aria-hidden="true" />
    </div>

    <div class="content">
        <div class="logo">
            <img src="/nasaka.svg" alt="Nasaka Logo">
        </div>

        <div class="status-dot">
            <div class="dot"></div>
            Target Reached
        </div>

        <h1>Recovering the site, <span>stay tuned.</span></h1>

        <p>
            The community has spoken. We have reached our funding goal and are now actively deploying the new
            infrastructure. Thank you for your support.
        </p>
    </div>
</body>

</html>
