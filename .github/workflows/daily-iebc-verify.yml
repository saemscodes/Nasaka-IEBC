name: Daily IEBC Data Verification
on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  workflow_dispatch:       # Manual trigger
    inputs:
      skip_nominatim:
        description: 'Skip Nominatim cross-reference (faster)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  verify-iebc-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run IEBC data verification
        id: verify
        run: |
          QUICK_FLAG=""
          if [ "${{ github.event.inputs.skip_nominatim }}" = "true" ]; then
            QUICK_FLAG="--quick"
          fi
          python scripts/verify_iebc_data.py $QUICK_FLAG --json-output > verification_output.json 2>verification_log.txt || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Parse verification results
        id: parse
        run: |
          if [ -f reports/latest_verification.json ]; then
            CRITICAL=$(python -c "import json; d=json.load(open('reports/latest_verification.json')); print(d.get('critical_issues', 0))")
            HEALTH=$(python -c "import json; d=json.load(open('reports/latest_verification.json')); print(d.get('health_score', 0))")
            TOTAL=$(python -c "import json; d=json.load(open('reports/latest_verification.json')); print(d.get('total_issues', 0))")
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "health=$HEALTH" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "health=100" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: iebc-verification-report-${{ github.run_number }}
          path: |
            reports/latest_verification.json
            reports/verification_report_*.json
            verification_log.txt
          retention-days: 90

      - name: Create issue on critical failures
        if: steps.parse.outputs.critical > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('reports/latest_verification.json', 'utf8'));
            } catch (e) {
              report = { critical_issues: 'unknown', total_issues: 'unknown', health_score: 'unknown', issues: [] };
            }

            const criticalIssues = (report.issues || [])
              .filter(i => i.severity === 'critical')
              .map(i => `- **[${i.type}]** ${i.message}`)
              .join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 IEBC Data Verification: ${report.critical_issues} Critical Issues Found`,
              body: `## Daily IEBC Data Verification Report\n\n` +
                    `**Run:** #${context.runNumber}\n` +
                    `**Health Score:** ${report.health_score}/100\n` +
                    `**Critical Issues:** ${report.critical_issues}\n` +
                    `**Total Issues:** ${report.total_issues}\n\n` +
                    `### Critical Issues\n\n${criticalIssues || 'None parsed'}\n\n` +
                    `### Action Required\n\n` +
                    `Please review the verification report artifact attached to ` +
                    `[Run #${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n\n` +
                    `Use the **Global IEBC Data Verifier** dashboard at \`/admin/verifier\` to investigate and fix these issues.`,
              labels: ['bug', 'iebc-data', 'automated']
            });

      - name: Summary
        run: |
          echo "## IEBC Data Verification Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health Score | ${{ steps.parse.outputs.health }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Issues | ${{ steps.parse.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Issues | ${{ steps.parse.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.parse.outputs.critical }}" -gt "0" ]; then
            echo "⚠️ **Action Required:** Critical data issues detected!" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All checks passed. No critical issues." >> $GITHUB_STEP_SUMMARY
          fi
